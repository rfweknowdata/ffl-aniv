services:
  app:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=file:/data/app.db
      - DATA_DIR=/data
    volumes:
      - app-data:/data
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app-data:
  caddy-data:
  caddy-config:
